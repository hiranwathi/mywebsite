<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | Hiranwathi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-container">
        <header class="login-header">
            <h2>Enter Portal</h2>
            <p class="subtitle">Securely access your dashboard</p>
        </header>

        <div class="form-content">
            <div class="input-wrapper">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
            </div>

            <div class="input-wrapper">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="access-btn" onclick="login()">
                <span>Access Account</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>

        <footer class="footer-section">
            <span>New member?</span>
            <a href="#" class="signup-link" onclick="signup()">Register here</a>
        </footer>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
